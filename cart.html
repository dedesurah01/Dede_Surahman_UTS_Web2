<!DOCTYPE html>
<html lang="id" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cireng Isi - Keranjang</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 transition-colors duration-300 min-h-screen">

  <!-- Navbar -->
  <nav class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
      <a href="shop.html" class="flex items-center gap-2">
        <span class="text-2xl">🥟</span>
        <span class="font-black text-orange-600 dark:text-orange-400 text-lg">Cireng Isi</span>
      </a>
      <div class="flex items-center gap-2">
        <button id="dark-toggle" class="w-9 h-9 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center text-lg hover:scale-110 transition-transform">🌙</button>
        <a href="shop.html" class="text-sm text-orange-500 hover:text-orange-700 font-semibold">← Lanjut Belanja</a>
      </div>
    </div>
  </nav>

  <div class="max-w-5xl mx-auto px-4 py-8">
    <h1 class="text-2xl font-black text-gray-800 dark:text-white mb-6">🛒 Keranjang Belanja</h1>

    <div id="cart-empty" class="hidden text-center py-20">
      <div class="text-7xl mb-4">🛒</div>
      <p class="text-gray-500 dark:text-gray-400 text-xl font-semibold">Keranjang masih kosong</p>
      <p class="text-gray-400 dark:text-gray-500 text-sm mt-2 mb-6">Yuk, tambahkan cireng favoritmu!</p>
      <a href="shop.html" class="bg-orange-500 hover:bg-orange-600 text-white font-bold px-8 py-3 rounded-xl transition inline-block">Mulai Belanja</a>
    </div>

    <div id="cart-content" class="hidden grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- Cart Items -->
      <div class="lg:col-span-2 space-y-3" id="cart-items"></div>

      <!-- Summary -->
      <div class="lg:col-span-1">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm p-6 sticky top-20">
          <h2 class="text-lg font-bold text-gray-800 dark:text-white mb-4">Ringkasan Pesanan</h2>
          
          <div class="space-y-2 mb-4 text-sm">
            <div class="flex justify-between text-gray-600 dark:text-gray-400">
              <span>Subtotal (<span id="item-count">0</span> item)</span>
              <span id="subtotal">Rp 0</span>
            </div>
            <div class="flex justify-between text-gray-600 dark:text-gray-400">
              <span>Ongkos Kirim</span>
              <span id="shipping-cost" class="text-green-500 font-semibold">Gratis</span>
            </div>
            <hr class="border-gray-100 dark:border-gray-700 my-2">
            <div class="flex justify-between font-bold text-gray-800 dark:text-white text-base">
              <span>Total</span>
              <span id="total-price" class="text-orange-600 dark:text-orange-400">Rp 0</span>
            </div>
          </div>

          <div id="free-shipping-note" class="hidden bg-green-50 dark:bg-green-900/20 text-green-600 dark:text-green-400 text-xs p-2 rounded-lg mb-4 text-center">
            🎉 Selamat! Kamu dapat gratis ongkir!
          </div>
          <div id="shipping-progress" class="mb-4">
            <p class="text-xs text-gray-500 dark:text-gray-400 mb-1">Tambah <span id="remaining-for-free"></span> lagi untuk gratis ongkir</p>
            <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-2">
              <div id="progress-bar" class="bg-orange-500 h-2 rounded-full transition-all duration-500" style="width:0%"></div>
            </div>
          </div>

          <a href="checkout.html" id="checkout-btn"
            class="block w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl text-center transition hover:shadow-lg">
            Checkout Sekarang →
          </a>
          <button onclick="clearCartConfirm()"
            class="w-full mt-2 text-sm text-red-400 hover:text-red-600 py-2 transition">
            🗑 Kosongkan Keranjang
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/cart.js"></script>
  <script>
    Utils.requireAuth();
    Utils.initDarkMode();

    const FREE_SHIPPING_THRESHOLD = 50000;

    function renderCart() {
      const items = Cart.getCart();
      const empty = document.getElementById('cart-empty');
      const content = document.getElementById('cart-content');

      if (items.length === 0) {
        empty.classList.remove('hidden');
        content.classList.add('hidden');
        return;
      }

      empty.classList.add('hidden');
      content.classList.remove('hidden');

      document.getElementById('cart-items').innerHTML = items.map(item => `
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm p-4 flex gap-4 items-center" id="item-${item.id}">
          <img src="${item.image}" alt="${item.nama}" class="w-20 h-20 rounded-xl object-cover shrink-0"
            onerror="this.src='https://via.placeholder.com/80?text=🥟'">
          <div class="flex-1 min-w-0">
            <h3 class="font-bold text-gray-800 dark:text-white text-sm truncate">${item.nama}</h3>
            <p class="text-orange-500 font-bold text-sm mt-0.5">${Utils.formatRupiah(item.price)}</p>
            <p class="text-gray-400 text-xs capitalize">${item.category}</p>
          </div>
          <div class="flex flex-col items-end gap-2 shrink-0">
            <button onclick="removeItem(${item.id})" class="text-red-400 hover:text-red-600 text-sm transition">🗑</button>
            <div class="flex items-center gap-2 bg-gray-100 dark:bg-gray-700 rounded-xl px-2 py-1">
              <button onclick="changeQty(${item.id}, ${item.qty - 1})" class="w-6 h-6 flex items-center justify-center text-gray-600 dark:text-gray-300 hover:text-orange-500 font-bold text-lg transition">−</button>
              <span class="w-6 text-center text-sm font-bold text-gray-800 dark:text-white">${item.qty}</span>
              <button onclick="changeQty(${item.id}, ${item.qty + 1})" class="w-6 h-6 flex items-center justify-center text-gray-600 dark:text-gray-300 hover:text-orange-500 font-bold text-lg transition">+</button>
            </div>
            <p class="text-xs font-bold text-gray-700 dark:text-gray-300">${Utils.formatRupiah(item.price * item.qty)}</p>
          </div>
        </div>
      `).join('');

      updateSummary(items);
    }

    function updateSummary(items) {
      const subtotal = Cart.getTotal();
      const count = Cart.getCount();
      const shipping = subtotal >= FREE_SHIPPING_THRESHOLD ? 0 : 10000;
      const total = subtotal + shipping;
      const progress = Math.min((subtotal / FREE_SHIPPING_THRESHOLD) * 100, 100);
      const remaining = FREE_SHIPPING_THRESHOLD - subtotal;

      document.getElementById('item-count').textContent = count;
      document.getElementById('subtotal').textContent = Utils.formatRupiah(subtotal);
      document.getElementById('total-price').textContent = Utils.formatRupiah(total);

      const shippingEl = document.getElementById('shipping-cost');
      const freeNote = document.getElementById('free-shipping-note');
      const progressSection = document.getElementById('shipping-progress');

      if (shipping === 0) {
        shippingEl.textContent = 'Gratis';
        freeNote.classList.remove('hidden');
        progressSection.classList.add('hidden');
      } else {
        shippingEl.textContent = Utils.formatRupiah(shipping);
        freeNote.classList.add('hidden');
        progressSection.classList.remove('hidden');
        document.getElementById('remaining-for-free').textContent = Utils.formatRupiah(remaining);
        document.getElementById('progress-bar').style.width = progress + '%';
      }
    }

    function changeQty(id, qty) {
      Cart.updateQty(id, qty);
      renderCart();
    }

    function removeItem(id) {
      Cart.removeItem(id);
      Utils.showToast('Item dihapus dari keranjang', 'info');
      renderCart();
    }

    function clearCartConfirm() {
      if (confirm('Yakin ingin mengosongkan keranjang?')) {
        Cart.clearCart();
        renderCart();
        Utils.showToast('Keranjang dikosongkan', 'info');
      }
    }

    renderCart();
  </script>
</body>
</html>
